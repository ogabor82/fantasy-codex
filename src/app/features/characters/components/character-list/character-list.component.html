<section class="space-y-4">
  <div class="flex items-end justify-between gap-3">
    <div>
      <p class="text-xs uppercase tracking-[0.08em] text-gray-400">Characters</p>
      <h1 class="text-3xl font-semibold text-gray-50">Character List</h1>
    </div>
    <span class="rounded-full border border-violet-900 bg-violet-950/40 px-3 py-1 text-sm text-violet-200">
      {{ characters.length }} total
    </span>
  </div>

  <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
    @for (character of characters; track character.id) {
      <article class="rounded-xl border border-violet-950 bg-violet-950/40 p-4">
        <div class="flex items-start gap-3">
          @if (character.portraitUrl) {
            <img [src]="character.portraitUrl" [alt]="character.name + ' portrait'" class="size-14 rounded-lg object-cover" />
          } @else {
            <div
              class="grid size-14 place-items-center rounded-lg bg-gradient-to-br from-violet-700 to-fuchsia-700 text-lg font-semibold text-violet-100"
            >
              {{ character.name.slice(0, 1) }}
            </div>
          }

          <div class="min-w-0">
            <h2 class="truncate text-xl font-semibold text-gray-100">{{ character.name }}</h2>
            <p class="text-sm text-violet-300">{{ character.title }}</p>
            <p class="mt-1 text-sm text-gray-400">{{ character.race }}</p>
          </div>
        </div>

        <p class="mt-3 text-sm leading-relaxed text-gray-300">{{ character.shortDescription }}</p>
      </article>
    }
  </div>
</section>
