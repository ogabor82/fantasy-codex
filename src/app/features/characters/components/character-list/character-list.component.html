<section class="space-y-7">
  <header class="rounded-xl border border-violet-900/70 bg-[#130722]/85">
    <div class="flex flex-wrap items-center gap-3 border-b border-violet-900/70 px-4 py-3">
      <h1 class="text-3xl font-semibold text-gray-100">Characters</h1>
      <div class="relative min-w-[250px] flex-1">
        <svg
          viewBox="0 0 24 24"
          class="pointer-events-none absolute left-3 top-1/2 size-4 -translate-y-1/2 text-violet-300"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input
          type="search"
          placeholder="Search world inhabitants..."
          class="w-full rounded-lg border border-violet-700 bg-[#1a0a2f] py-2 pl-9 pr-3 text-sm text-violet-100 placeholder:text-violet-400/70 focus:border-violet-500 focus:outline-none"
        />
      </div>
      <button
        type="button"
        class="rounded-lg bg-violet-600 px-4 py-2 text-sm font-semibold text-violet-50 transition hover:bg-violet-500"
      >
        New Character
      </button>
      <div class="grid size-8 place-items-center rounded-full border border-amber-300/40 bg-amber-100/20 text-xs font-semibold text-amber-100">
        EV
      </div>
    </div>
  </header>

  <div class="flex items-center justify-between gap-4">
    <p class="text-xs uppercase tracking-[0.12em] text-gray-400">
      Sort By:
      <span class="ml-2 text-violet-400">{{ sortBy }}</span>
    </p>
    <div class="flex items-center gap-2 text-violet-300">
      <button
        type="button"
        class="grid size-10 place-items-center rounded-md border border-violet-700 bg-violet-900/40"
        aria-label="Grid view"
      >
        <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="4" y="4" width="6" height="6"></rect>
          <rect x="14" y="4" width="6" height="6"></rect>
          <rect x="4" y="14" width="6" height="6"></rect>
          <rect x="14" y="14" width="6" height="6"></rect>
        </svg>
      </button>
      <button type="button" class="grid size-10 place-items-center rounded-md border border-violet-900/60 bg-transparent" aria-label="List view">
        <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M8 6h12"></path>
          <path d="M8 12h12"></path>
          <path d="M8 18h12"></path>
          <circle cx="4" cy="6" r="1"></circle>
          <circle cx="4" cy="12" r="1"></circle>
          <circle cx="4" cy="18" r="1"></circle>
        </svg>
      </button>
    </div>
  </div>

  <div class="grid gap-6 md:grid-cols-2 2xl:grid-cols-4">
    @for (character of characters; track character.id) {
      <article class="overflow-hidden rounded-xl border border-violet-900/70 bg-[#150726]">
        <img [src]="character.portraitUrl" [alt]="character.name + ' portrait'" class="h-56 w-full object-cover" />

        <div class="space-y-4 px-5 pb-5 pt-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h2 class="truncate text-3xl font-semibold text-gray-100">{{ character.name }}</h2>
              <p class="text-sm text-violet-400">{{ character.title }}</p>
            </div>
            <span class="pt-1 text-lg leading-none text-violet-300/80">...</span>
          </div>

          <ul class="space-y-2 text-gray-300">
            <li class="flex items-center gap-2">
              <svg viewBox="0 0 24 24" class="size-4 text-violet-300" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <circle cx="12" cy="12" r="8"></circle>
                <path d="M12 8v4l2.5 2.5"></path>
              </svg>
              <span>{{ character.race }}</span>
            </li>
            <li class="flex items-center gap-2">
              <svg viewBox="0 0 24 24" class="size-4 text-violet-300" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M17 20v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
                <circle cx="10" cy="8" r="3"></circle>
                <path d="M23 20v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 5.13a3 3 0 0 1 0 5.75"></path>
              </svg>
              <span>{{ character.factionName }}</span>
            </li>
            <li class="flex items-center gap-2">
              <svg viewBox="0 0 24 24" class="size-4 text-violet-300" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z"></path>
                <circle cx="12" cy="10" r="2.5"></circle>
              </svg>
              <span>{{ character.locationName }}</span>
            </li>
          </ul>
        </div>
      </article>
    }
  </div>
</section>
