<div class="min-h-dvh bg-[radial-gradient(circle_at_top,_#1f2937,_#111827_50%)] text-gray-200 font-sans">
  <div class="mx-auto max-w-[1100px] p-4">
    <header class="flex flex-wrap justify-between gap-4 rounded-xl border border-gray-700 bg-gray-900/75 p-4">
      <div>
        <p class="m-0 text-xs uppercase tracking-[0.08em] text-gray-400">Worldbuilding Admin</p>
        <a
          class="brand-title mt-[0.2rem] inline-block text-2xl font-bold text-gray-50 no-underline"
          routerLink="/"
        >
          {{ appTitle }}
        </a>
      </div>

      <nav class="flex flex-wrap items-center gap-2" aria-label="Primary">
        <a
          routerLink="/"
          routerLinkActive="border-gray-500 bg-gray-800 text-gray-50"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg border border-transparent px-3 py-2 text-gray-300 no-underline hover:border-gray-600 hover:text-gray-50"
        >
          Dashboard
        </a>
        <a
          routerLink="/characters"
          routerLinkActive="border-gray-500 bg-gray-800 text-gray-50"
          class="rounded-lg border border-transparent px-3 py-2 text-gray-300 no-underline hover:border-gray-600 hover:text-gray-50"
        >
          Characters
        </a>
        <a
          routerLink="/factions"
          routerLinkActive="border-gray-500 bg-gray-800 text-gray-50"
          class="rounded-lg border border-transparent px-3 py-2 text-gray-300 no-underline hover:border-gray-600 hover:text-gray-50"
        >
          Factions
        </a>
        <a
          routerLink="/locations"
          routerLinkActive="border-gray-500 bg-gray-800 text-gray-50"
          class="rounded-lg border border-transparent px-3 py-2 text-gray-300 no-underline hover:border-gray-600 hover:text-gray-50"
        >
          Locations
        </a>
      </nav>
    </header>

    <main class="mt-4 min-h-[60dvh] rounded-xl border border-gray-700 bg-gray-900/70 p-5">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
