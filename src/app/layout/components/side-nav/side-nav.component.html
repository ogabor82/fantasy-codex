<aside class="w-full max-w-[272px] rounded-2xl border border-[#241343] bg-[#120826] text-[#a3b3d3] shadow-[0_24px_40px_rgba(5,1,14,0.5)] lg:h-[calc(100dvh-2rem)] lg:sticky lg:top-4 lg:flex lg:flex-col">
  <div class="px-5 pt-5">
    <div class="flex items-center gap-3">
      <div class="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br from-[#5a17ec] to-[#7f2dff] text-white shadow-[0_10px_22px_rgba(110,42,255,0.45)]">
        <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h4.5A2.75 2.75 0 0 1 13 6.75V20a2.5 2.5 0 0 0-2.5-2.5h-4A2.5 2.5 0 0 0 4 20V6.75Z" />
          <path d="M13 6.75A2.75 2.75 0 0 1 15.75 4h4.5A2.75 2.75 0 0 1 23 6.75V20a2.5 2.5 0 0 0-2.5-2.5h-4A2.5 2.5 0 0 0 14 20V6.75Z" />
        </svg>
      </div>
      <div>
        <a class="brand-title block text-[1.75rem] font-semibold leading-none tracking-tight text-[#eff4ff] no-underline" routerLink="/">{{ appTitle }}</a>
        <p class="text-xs uppercase tracking-[0.13em] text-[#8d4bff]">Worldbuilder Admin</p>
      </div>
    </div>

    <nav class="mt-8" aria-label="Primary">
      <ul class="space-y-1">
        <li>
          <a routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="bg-gradient-to-r from-[#5d19ef] to-[#8425ff] text-white shadow-[0_10px_24px_rgba(122,48,255,0.45)]" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-[1.12rem] font-medium text-[#9ba7c5] transition-colors hover:bg-[#241349] hover:text-[#f4f8ff]">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 4h7v7H4z" />
              <path d="M13 4h7v4h-7z" />
              <path d="M13 10h7v10h-7z" />
              <path d="M4 13h7v7H4z" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a routerLink="/characters" routerLinkActive="bg-gradient-to-r from-[#5d19ef] to-[#8425ff] text-white shadow-[0_10px_24px_rgba(122,48,255,0.45)]" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-[1.12rem] font-medium text-[#9ba7c5] transition-colors hover:bg-[#241349] hover:text-[#f4f8ff]">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="8" r="3.5" />
              <path d="M5 20a7 7 0 0 1 14 0" />
            </svg>
            Characters
          </a>
        </li>
        <li>
          <a routerLink="/factions" routerLinkActive="bg-gradient-to-r from-[#5d19ef] to-[#8425ff] text-white shadow-[0_10px_24px_rgba(122,48,255,0.45)]" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-[1.12rem] font-medium text-[#9ba7c5] transition-colors hover:bg-[#241349] hover:text-[#f4f8ff]">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3 5 6v6c0 5 3.7 8.7 7 9.9 3.3-1.2 7-4.9 7-9.9V6l-7-3Z" />
            </svg>
            Factions
          </a>
        </li>
        <li>
          <a routerLink="/locations" routerLinkActive="bg-gradient-to-r from-[#5d19ef] to-[#8425ff] text-white shadow-[0_10px_24px_rgba(122,48,255,0.45)]" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-[1.12rem] font-medium text-[#9ba7c5] transition-colors hover:bg-[#241349] hover:text-[#f4f8ff]">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 6.5 10.5 4l3 2.5L20 4v13.5L13.5 20l-3-2.5L4 20V6.5Z" />
              <path d="M10.5 4v13.5" />
              <path d="M13.5 6.5V20" />
            </svg>
            Locations
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <div class="mt-8 border-t border-[#241343] px-5 py-5 lg:mt-auto">
    <div class="flex items-center gap-3">
      <div class="grid h-10 w-10 place-items-center overflow-hidden rounded-full border border-[#8b5cf6] bg-gradient-to-br from-[#ffe9df] via-[#ffd7c5] to-[#ffbfa6] text-sm font-semibold text-[#4a2234]">EV</div>
      <div>
        <p class="text-[1.05rem] font-semibold leading-tight text-[#eff4ff]">Elara Vance</p>
        <p class="text-sm leading-tight text-[#8f9abb]">Master Scribe</p>
      </div>
    </div>
  </div>
</aside>
