<aside class="flex w-64 shrink-0 flex-col border-r border-slate-200 bg-white dark:border-[color-mix(in_oklab,var(--color-primary)_20%,transparent)] dark:bg-[var(--color-background-dark)]">
  <div class="flex items-center gap-3 p-6">
    <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-[var(--color-primary)] text-white">
      <span class="material-symbols-outlined">auto_stories</span>
    </div>
    <div>
      <h1 class="text-sm font-bold tracking-tight">{{ appTitle }}</h1>
      <p class="text-xs text-slate-500 dark:text-[color-mix(in_oklab,var(--color-primary)_60%,white)]">World Builder v2.1</p>
    </div>
  </div>

  <nav class="flex-1 space-y-1 px-4" aria-label="Primary">
    <a
      routerLink="/characters"
      routerLinkActive="bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)] text-[var(--color-primary)]"
      class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)]"
    >
      <span class="material-symbols-outlined text-[20px]">person</span>
      <span>Characters</span>
    </a>
    <a
      routerLink="/locations"
      routerLinkActive="bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)] text-[var(--color-primary)]"
      class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)]"
    >
      <span class="material-symbols-outlined text-[20px]">map</span>
      <span>Locations</span>
    </a>
    <a
      routerLink="/factions"
      routerLinkActive="bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)] text-[var(--color-primary)]"
      class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)]"
    >
      <span class="material-symbols-outlined text-[20px]">group</span>
      <span>Factions</span>
    </a>
    <a
      routerLink="/"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)] text-[var(--color-primary)]"
      class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-[color-mix(in_oklab,var(--color-primary)_10%,transparent)]"
    >
      <span class="material-symbols-outlined text-[20px]">dashboard</span>
      <span>Dashboard</span>
    </a>
  </nav>

  <div class="mt-auto p-4">
    <button
      type="button"
      class="flex w-full items-center justify-center gap-2 rounded-lg bg-[var(--color-primary)] px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-[color-mix(in_oklab,var(--color-primary)_20%,transparent)] transition-colors hover:bg-[color-mix(in_oklab,var(--color-primary)_90%,black)]"
    >
      <span class="material-symbols-outlined text-sm">edit_note</span>
      Quick Note
    </button>
  </div>
</aside>
